services:
- type: web
  name: dandelion-web
  env: ruby
  plan: free
  buildCommand: "bundle config path vendor/bundle && bundle install --jobs 4 --retry 3"
  startCommand: "bundle exec puma -C config/puma.rb"
  autoDeploy: false
  envVars:
  - key: FRONTEND_URL
    fromService:
      type: web
      name: dandelion-web

- type: pserv
  name: dandelion-db
  env: docker
  plan: free
  autoDeploy: false
  disk:
    name: data
    mountPath: /data/db
    sizeGB: 10
