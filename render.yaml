services:
- type: web
  name: dandelion-web
  env: ruby
  buildCommand: "bundle config path vendor/bundle && bundle install --jobs 4 --retry 3"
  startCommand: "bundle exec puma -C config/puma.rb"
  autoDeploy: false
  envVars:
  - key: FRONTEND_URL
    fromService:
      type: web
      name: dandelion-web
  - key: DATABASE_URL
    fromDatabase:
      name: dandelion-db
      property: connectionString
  - key: SECRET_KEY_BASE
      generateValue: true

- type: pserv
    name: dandelion-db
    env: docker
    autoDeploy: false
    disk:
      name: data
      mountPath: /data/db
      sizeGB: 10
  plan: free
